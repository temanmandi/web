<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teman Mandi 🛁</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:linear-gradient(160deg,#FDF6EC 0%,#EDE3D4 100%);
  font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px;overflow:hidden;position:relative;
}

/* ── BUBBLES ── */
.bubble{
  position:fixed;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(255,255,255,.7),rgba(188,108,73,.12));
  border:1.5px solid rgba(255,255,255,.5);
  animation:rise linear infinite;
  pointer-events:none;
}
@keyframes rise{
  0%{transform:translateY(110vh) scale(1);opacity:0}
  10%{opacity:1}
  90%{opacity:.6}
  100%{transform:translateY(-20vh) scale(1.1);opacity:0}
}

/* ── CARD ── */
.card{
  background:rgba(255,253,249,.85);
  backdrop-filter:blur(12px);
  border:1.5px solid rgba(231,221,207,.8);
  border-radius:32px;
  padding:44px 40px;
  width:100%;max-width:400px;
  text-align:center;
  box-shadow:0 20px 60px rgba(59,47,40,.1);
  position:relative;z-index:10;
}

.duck{font-size:64px;line-height:1;display:block;animation:bob 2.5s ease-in-out infinite;margin-bottom:4px}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-8px) rotate(3deg)}}

.title{
  font-size:30px;font-weight:800;
  color:#3B2F28;letter-spacing:-.5px;margin-bottom:4px;
}
.title span{color:#BC6C49}
.tagline{font-size:14px;color:#8C7B6A;margin-bottom:32px;line-height:1.5}

.btn{
  display:flex;align-items:center;gap:16px;
  width:100%;padding:18px 22px;border-radius:20px;
  border:none;cursor:pointer;text-decoration:none;font-family:inherit;
  transition:transform .2s,box-shadow .2s;margin-bottom:12px;
  text-align:left;
}
.btn:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,.13)}
.btn:active{transform:translateY(-1px)}

.btn-store{background:linear-gradient(135deg,#BC6C49,#9E5638);color:#fff}
.btn-admin{background:linear-gradient(135deg,#3B2F28,#5a4640);color:#fff}

.btn-emoji{
  width:50px;height:50px;border-radius:14px;
  background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;flex-shrink:0;
}
.btn-text strong{display:block;font-size:15.5px;font-weight:700}
.btn-text small{display:block;font-size:12px;opacity:.75;margin-top:2px}

.or{
  display:flex;align-items:center;gap:10px;margin:4px 0 12px;
  font-size:12px;color:#8C7B6A;
}
.or::before,.or::after{content:'';flex:1;height:1px;background:var(--line,#E7DDCF)}

.footer{margin-top:24px;font-size:12px;color:#B09A88}
.footer b{color:#BC6C49}
</style>
</head>
<body>

<script>
// Generate floating bubbles
const sizes  = [20,28,36,44,55,70];
const delays = [0,1.5,3,4.5,6,7.5,9,11];
const lefts  = [5,12,22,33,44,55,65,74,83,91];
for (let i = 0; i < 18; i++) {
  const b = document.createElement('div');
  b.className = 'bubble';
  const s = sizes[i % sizes.length];
  b.style.cssText = `
    width:${s}px;height:${s}px;
    left:${lefts[i % lefts.length] + (i % 3) * 2}%;
    bottom:-${s}px;
    animation-duration:${7 + (i % 5) * 1.5}s;
    animation-delay:${delays[i % delays.length]}s;
  `;
  document.body.appendChild(b);
}
</script>

<div class="card">
  <span class="duck">🦆</span>
  <h1 class="title">teman <span>mandi</span></h1>
  <p class="tagline">Sabunnya udah siap, airnya udah panas ☁️<br>Mau ke mana dulu nih?</p>

  <a href="https://temanmandi.github.io/web/" target="_blank" class="btn btn-store">
    <div class="btn-emoji">🛁</div>
    <div class="btn-text">
      <strong>Buka Toko Online</strong>
      <small>Lihat produk & belanja sekarang</small>
    </div>
  </a>

  <div class="or">atau</div>

  <a href="admin.html" class="btn btn-admin">
    <div class="btn-emoji">🧼</div>
    <div class="btn-text">
      <strong>Dapur Sabun (Admin)</strong>
      <small>Kelola produk, order & pengaturan</small>
    </div>
  </a>

  <p class="footer">✨ Produk <b>BPOM</b> & <b>Halal</b> certified</p>
</div>

</body>
</html>
